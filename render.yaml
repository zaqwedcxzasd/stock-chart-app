services:
  - type: web
    name: stock-chart-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JQUANTS_API_KEY
        sync: false          # Render ダッシュボードで手動設定
      - key: ALLOWED_ORIGINS
        sync: false          # 例: https://your-app.vercel.app
